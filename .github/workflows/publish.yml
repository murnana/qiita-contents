# Please set 'QIITA_TOKEN', 'APP_ID', and 'APP_PRIVATE_KEY' secrets to your repository
# See docs/development/github-workflows/github-app-setup.md for GitHub App setup instructions
name: Publish articles

on:
  push:
    branches:
      - main
    paths:
      - 'public/**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  publish_articles:
    name: Publish articles
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Publish articles and sync metadata in Dev Container
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 #v0.3.1900000449
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
          # GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          env: QIITA_TOKEN,GH_TOKEN
          runCmd: |
            npx qiita publish --all

            if git diff --quiet public/; then
              echo "変更なし: メタデータの更新はありませんでした"
            else
              echo "変更あり: メタデータが更新されました"
              git diff --stat public/

              BRANCH="automated/qiita-metadata-$(date +%Y%m%d-%H%M%S)"
              git checkout -b "$BRANCH"
              git add public/
              git commit -m "$(printf 'Qiita 公開後のメタデータを更新\n\n記事の公開により以下のメタデータが更新されました:\n- 記事 ID (新規公開の場合)\n- 更新日時\n\n公開された記事: https://qiita.com/murnana')"

              git push origin "$BRANCH"

              printf '%s\n' \
                '## 概要' \
                '' \
                'Qiita への記事公開後、自動的にメタデータを同期しました。' \
                '' \
                '## 変更内容' \
                '' \
                '- 記事の `id` フィールドを Qiita の記事 UUID で更新' \
                '- 記事の `updated_at` フィールドを更新' \
                '' \
                '## 確認事項' \
                '' \
                '- メタデータのみの変更であることを確認してください' \
                '- 記事の内容に意図しない変更がないか確認してください' \
                '- 公開された記事: https://qiita.com/murnana' \
                '' \
                '## 注意' \
                '' \
                'このプルリクエストは qiita-publisher bot により自動作成されました。' \
                'レビュー後、問題がなければマージしてください。' \
                > /tmp/pr-body.md

              gh pr create \
                --title "🔄 Qiita 記事メタデータの更新" \
                --body-file /tmp/pr-body.md \
                --base main \
                --head "$BRANCH" \
                --label "automated"
            fi
